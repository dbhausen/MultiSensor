[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps = 
	adafruit/Adafruit LSM6DS@^4.7.3
	adafruit/Adafruit Unified Sensor@^1.1.14
	mikalhart/TinyGPSPlus@^1.0.3
	davidarmstrong/WMM_Tinier@^1.0.3
	mprograms/QMC5883LCompass@^1.2.3
	ttlappalainen/NMEA2000-library@^4.24.1
	ttlappalainen/NMEA0183@^1.10.1
	https://github.com/ttlappalainen/NMEA2000_mcp.git
lib_extra_dirs = ../MultiSensor/lib
